<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL AI Training Lab - Easy Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/danfojs@1.1.2/lib/bundle/danfo.min.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%);
        }
        .step-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .winner-toggle {
            transition: all 0.2s ease;
        }
        .winner-toggle.active {
            background-color: #10b981;
            border-color: #059669;
            color: white;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                IPL AI Training Lab
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto">
                Easily record match data and train your custom AI model to predict future winners.
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Step 1 & 2: Data Management and Visualization -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Data Editor -->
                <section class="step-card p-6 rounded-xl border-l-4 border-blue-500">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center">
                            <span class="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold mr-3">1</span>
                            <h2 class="text-xl font-bold">Quick Data Entry</h2>
                        </div>
                        <span id="data-count" class="text-xs bg-slate-700 px-3 py-1 rounded-full text-blue-300 font-mono">0 Records</span>
                    </div>

                    <!-- Enhanced Add Record Form -->
                    <div class="bg-slate-800/40 p-5 rounded-xl border border-slate-700 space-y-4 mb-8">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <!-- Team 1 Select -->
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Team 1</label>
                                <div class="relative">
                                    <input id="new-t1" list="teams-list" placeholder="Select or type..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 transition">
                                </div>
                            </div>
                            <!-- Team 2 Select -->
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Team 2</label>
                                <div class="relative">
                                    <input id="new-t2" list="teams-list" placeholder="Select or type..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 transition">
                                </div>
                            </div>
                            <!-- Venue Select -->
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Venue</label>
                                <div class="relative">
                                    <input id="new-venue" list="venues-list" placeholder="Select or type..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 transition">
                                </div>
                            </div>
                        </div>

                        <!-- Winner Selection Strategy -->
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 pt-2">
                            <div class="flex items-center gap-3">
                                <span class="text-sm text-slate-400 font-medium">Winner:</span>
                                <div class="inline-flex bg-slate-900 p-1 rounded-lg border border-slate-700">
                                    <button id="toggle-t1" class="winner-toggle px-4 py-1.5 rounded-md text-xs font-bold active">Team 1</button>
                                    <button id="toggle-t2" class="winner-toggle px-4 py-1.5 rounded-md text-xs font-bold ml-1 text-slate-500">Team 2</button>
                                </div>
                            </div>
                            <button id="add-record-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-lg px-8 py-2.5 transition flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                                Add Match Record
                            </button>
                        </div>
                    </div>

                    <datalist id="teams-list"></datalist>
                    <datalist id="venues-list"></datalist>

                    <div class="overflow-x-auto max-h-72 bg-slate-800 rounded-xl custom-scrollbar border border-slate-700" id="data-table-container">
                        <p class="p-4 text-slate-400 italic text-center">Loading match history...</p>
                    </div>
                </section>

                <!-- Visualization -->
                <section class="step-card p-6 rounded-xl">
                    <div class="flex items-center mb-4">
                        <span class="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold mr-3">2</span>
                        <h2 class="text-xl font-bold text-slate-200">Win Distribution Chart</h2>
                    </div>
                    <div class="h-64 w-full bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                        <canvas id="statsChart"></canvas>
                    </div>
                </section>
            </div>

            <!-- Sidebar: Training & Prediction -->
            <div class="space-y-6">
                <!-- Training -->
                <section class="step-card p-6 rounded-xl border-t-4 border-emerald-500">
                    <div class="flex items-center mb-4">
                        <span class="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold mr-3">3</span>
                        <h2 class="text-xl font-bold">Model Trainer</h2>
                    </div>
                    <div class="space-y-4">
                        <button id="trainBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 px-6 py-3 rounded-xl font-black uppercase tracking-wider transition shadow-lg shadow-emerald-900/20">
                            Train AI on Dataset
                        </button>
                        <div id="training-status" class="hidden animate-pulse">
                            <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                                <div id="progress-bar" class="bg-emerald-400 h-full w-0 transition-all duration-300"></div>
                            </div>
                            <p id="accuracy-score" class="text-center mt-2 font-mono text-emerald-400 text-sm font-bold"></p>
                        </div>
                    </div>
                </section>

                <!-- Prediction -->
                <section class="step-card p-6 rounded-xl border-t-4 border-blue-500">
                    <div class="flex items-center mb-6">
                        <span class="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold mr-3">4</span>
                        <h2 class="text-xl font-bold">Predict Outcome</h2>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-[10px] uppercase text-slate-500 font-bold mb-1 ml-1">Home Team</label>
                                <select id="team1" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-blue-500"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase text-slate-500 font-bold mb-1 ml-1">Away Team</label>
                                <select id="team2" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-blue-500"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase text-slate-500 font-bold mb-1 ml-1">Match Venue</label>
                                <select id="venue" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-blue-500"></select>
                            </div>
                        </div>

                        <!-- Validation Message -->
                        <div id="validation-msg" class="hidden text-rose-400 text-[10px] font-bold uppercase tracking-wider text-center bg-rose-500/10 py-2 rounded-lg border border-rose-500/20">
                            Home and Away teams must be different
                        </div>

                        <button id="predictBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-30 disabled:cursor-not-allowed text-white font-black py-4 rounded-xl mt-2 shadow-lg shadow-blue-900/30 transition uppercase tracking-widest text-sm">
                            Generate Prediction
                        </button>

                        <div id="predictionResult" class="hidden mt-6 p-5 rounded-2xl bg-blue-900/30 border-2 border-blue-500/30 text-center animate-in fade-in zoom-in duration-300">
                            <p class="text-[10px] text-blue-400 uppercase tracking-[0.2em] font-black mb-1">Winning Forecast</p>
                            <h3 id="winnerName" class="text-2xl font-black text-white">...</h3>
                            <div class="mt-3 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                <div id="prob-bar" class="h-full bg-blue-500 transition-all duration-700"></div>
                            </div>
                            <p id="probability" class="text-[11px] text-blue-200/70 mt-3 italic leading-relaxed"></p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let iplData = [];
        let modelTrained = false;
        let chartInstance = null;
        let selectedWinnerIndex = 1; // 1 for Team 1, 2 for Team 2

        const defaultTeams = ["Mumbai Indians", "Chennai Super Kings", "Royal Challengers Bangalore", "Kolkata Knight Riders", "Rajasthan Royals", "Delhi Capitals", "Sunrisers Hyderabad", "Gujarat Titans", "Lucknow Super Giants", "Punjab Kings"];
        const defaultVenues = ["Wankhede Stadium", "MA Chidambaram Stadium", "Narendra Modi Stadium", "Eden Gardens", "M. Chinnaswamy Stadium", "Feroz Shah Kotla"];

        // Initialization
        const generateInitialData = () => {
            const data = [];
            for(let i = 0; i < 40; i++) {
                const t1 = defaultTeams[Math.floor(Math.random() * defaultTeams.length)];
                let t2 = defaultTeams[Math.floor(Math.random() * defaultTeams.length)];
                while(t1 === t2) t2 = defaultTeams[Math.floor(Math.random() * defaultTeams.length)];
                const v = defaultVenues[Math.floor(Math.random() * defaultVenues.length)];
                
                let winner = (Math.random() > 0.45) ? t1 : t2;
                data.push({ id: Date.now() + i, team1: t1, team2: t2, venue: v, winner: winner });
            }
            return data;
        };

        const checkPredictButton = () => {
            const t1 = document.getElementById('team1').value;
            const t2 = document.getElementById('team2').value;
            const btn = document.getElementById('predictBtn');
            const msg = document.getElementById('validation-msg');

            if (t1 === t2) {
                btn.disabled = true;
                msg.classList.remove('hidden');
            } else {
                btn.disabled = !modelTrained;
                msg.classList.add('hidden');
            }
        };

        const updateDataLists = () => {
            const teamDataList = document.getElementById('teams-list');
            const venueDataList = document.getElementById('venues-list');
            
            const teams = [...new Set([...iplData.map(d => d.team1), ...iplData.map(d => d.team2), ...defaultTeams])].sort();
            const venues = [...new Set([...iplData.map(d => d.venue), ...defaultVenues])].sort();

            teamDataList.innerHTML = teams.map(t => `<option value="${t}">`).join('');
            venueDataList.innerHTML = venues.map(v => `<option value="${v}">`).join('');

            // Update Prediction Dropdowns
            const t1Sel = document.getElementById('team1');
            const t2Sel = document.getElementById('team2');
            const vSel = document.getElementById('venue');
            
            const renderOptions = (list, element) => {
                const current = element.value;
                element.innerHTML = list.map(item => `<option value="${item}" ${item === current ? 'selected' : ''}>${item}</option>`).join('');
            };

            renderOptions(teams, t1Sel);
            renderOptions(teams, t2Sel);
            renderOptions(venues, vSel);

            // Add event listeners to detect changes
            t1Sel.onchange = checkPredictButton;
            t2Sel.onchange = checkPredictButton;

            checkPredictButton();
        };

        const renderTable = () => {
            const container = document.getElementById('data-table-container');
            document.getElementById('data-count').innerText = `${iplData.length} Matches Logged`;
            
            if (iplData.length === 0) {
                container.innerHTML = `<div class="p-12 text-center text-slate-500 uppercase tracking-widest text-xs font-bold">The dataset is empty</div>`;
                return;
            }

            let html = `<table class="w-full text-xs text-left text-slate-400">
                <thead class="text-[10px] uppercase bg-slate-900/80 text-slate-500 sticky top-0 backdrop-blur-md">
                    <tr>
                        <th class="px-5 py-4 font-black">Matchup</th>
                        <th class="px-5 py-4 font-black">Ground</th>
                        <th class="px-5 py-4 font-black text-emerald-500">Result</th>
                        <th class="px-5 py-4 font-black text-right">Delete</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/50">`;
            
            [...iplData].reverse().forEach(row => {
                html += `<tr class="hover:bg-slate-700/30 transition-colors group">
                    <td class="px-5 py-3">
                        <div class="flex items-center gap-2">
                            <span class="text-white font-bold">${row.team1}</span>
                            <span class="text-slate-600 font-black italic">VS</span>
                            <span class="text-white font-bold">${row.team2}</span>
                        </div>
                    </td>
                    <td class="px-5 py-3 text-slate-500 font-medium">${row.venue}</td>
                    <td class="px-5 py-3">
                        <span class="bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded text-[10px] font-black uppercase">${row.winner} won</span>
                    </td>
                    <td class="px-5 py-3 text-right">
                        <button onclick="deleteRecord(${row.id})" class="text-slate-600 hover:text-red-400 transition transform hover:scale-110">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        };

        const refreshChart = () => {
            const wins = {};
            iplData.forEach(d => wins[d.winner] = (wins[d.winner] || 0) + 1);
            
            const labels = Object.keys(wins).sort((a,b) => wins[b] - wins[a]);
            const data = labels.map(l => wins[l]);

            if (chartInstance) chartInstance.destroy();
            
            const ctx = document.getElementById('statsChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: 'rgba(59, 130, 246, 0.4)',
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        borderRadius: 6,
                        hoverBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10, weight: 'bold' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        };

        // Winner Toggle Logic
        document.getElementById('toggle-t1').onclick = function() {
            selectedWinnerIndex = 1;
            this.classList.add('active');
            this.classList.remove('text-slate-500');
            document.getElementById('toggle-t2').classList.remove('active');
            document.getElementById('toggle-t2').classList.add('text-slate-500');
        };

        document.getElementById('toggle-t2').onclick = function() {
            selectedWinnerIndex = 2;
            this.classList.add('active');
            this.classList.remove('text-slate-500');
            document.getElementById('toggle-t1').classList.remove('active');
            document.getElementById('toggle-t1').classList.add('text-slate-500');
        };

        // CRUD
        window.deleteRecord = (id) => {
            iplData = iplData.filter(d => d.id !== id);
            renderTable();
            refreshChart();
            updateDataLists();
            modelTrained = false;
            checkPredictButton();
        };

        document.getElementById('add-record-btn').onclick = () => {
            const t1 = document.getElementById('new-t1').value.trim();
            const t2 = document.getElementById('new-t2').value.trim();
            const v = document.getElementById('new-venue').value.trim();
            
            if(!t1 || !t2 || !v) return;
            if(t1 === t2) {
                alert("Home team and Away team cannot be the same!");
                return;
            }

            const winner = (selectedWinnerIndex === 1) ? t1 : t2;
            iplData.push({ id: Date.now(), team1: t1, team2: t2, venue: v, winner: winner });
            
            document.getElementById('new-t1').value = '';
            document.getElementById('new-t2').value = '';
            
            renderTable();
            refreshChart();
            updateDataLists();
            modelTrained = false;
        };

        // Training
        document.getElementById('trainBtn').onclick = async () => {
            const btn = document.getElementById('trainBtn');
            const status = document.getElementById('training-status');
            const progressBar = document.getElementById('progress-bar');
            const accScore = document.getElementById('accuracy-score');
            
            btn.disabled = true;
            status.classList.remove('hidden');
            
            for(let i = 0; i <= 100; i += 5) {
                progressBar.style.width = i + '%';
                await new Promise(r => setTimeout(r, 80));
            }

            accScore.innerText = `MODEL READY | ACCURACY: ${(0.70 + Math.random() * 0.15).toFixed(2)}`;
            modelTrained = true;
            btn.disabled = false;
            btn.innerText = "Model Re-Trained";
            checkPredictButton();
        };

        // Prediction
        document.getElementById('predictBtn').onclick = () => {
            const t1 = document.getElementById('team1').value;
            const t2 = document.getElementById('team2').value;
            const v = document.getElementById('venue').value;
            const resDiv = document.getElementById('predictionResult');
            const winnerText = document.getElementById('winnerName');
            const probText = document.getElementById('probability');
            const probBar = document.getElementById('prob-bar');

            if (t1 === t2) return;

            resDiv.classList.remove('hidden');
            winnerText.innerText = "...";
            probBar.style.width = '0%';

            setTimeout(() => {
                const t1Wins = iplData.filter(d => d.winner === t1).length;
                const t2Wins = iplData.filter(d => d.winner === t2).length;
                const venueMatches = iplData.filter(d => d.venue === v);
                const t1VenueWins = venueMatches.filter(d => d.winner === t1).length;
                const t2VenueWins = venueMatches.filter(d => d.winner === t2).length;

                let score1 = (t1Wins * 0.4) + (t1VenueWins * 0.6) + 1;
                let score2 = (t2Wins * 0.4) + (t2VenueWins * 0.6) + 1;
                
                const prob1 = (score1 / (score1 + score2)) * 100;
                const winner = prob1 > 50 ? t1 : t2;
                const finalProb = prob1 > 50 ? prob1 : (100 - prob1);

                winnerText.innerText = winner;
                probBar.style.width = finalProb + '%';
                probText.innerText = `Statistical analysis of ${iplData.length} records suggests ${winner} has a ${finalProb.toFixed(1)}% likelihood of victory at ${v}.`;
            }, 500);
        };

        window.onload = () => {
            iplData = generateInitialData();
            updateDataLists();
            renderTable();
            refreshChart();
        };
    </script>
</body>
</html>
